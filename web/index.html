<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Download Console</title>
    <style>
        :root {
            --bg: #f4efe6;
            --ink: #1f2a2c;
            --muted: #6a7475;
            --line: rgba(31, 42, 44, 0.12);
            --card: rgba(255, 251, 245, 0.88);
            --primary: #0f766e;
            --primary-soft: rgba(15, 118, 110, 0.12);
            --warn: #b45309;
            --danger: #b91c1c;
            --ok: #15803d;
            --shadow: 0 18px 48px rgba(45, 55, 72, 0.12);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top right, rgba(15, 118, 110, 0.14), transparent 34%),
                radial-gradient(circle at left center, rgba(180, 83, 9, 0.12), transparent 28%),
                linear-gradient(180deg, #f7f2ea 0%, #f2ece1 100%);
        }

        .shell {
            max-width: 1380px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        .hero-card, .panel, .task-card, .drawer-panel {
            background: var(--card);
            backdrop-filter: blur(14px);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .hero-card {
            padding: 28px;
        }

        .hero-card,
        .panel,
        .task-card {
            overflow: hidden;
        }

        .eyebrow {
            display: inline-flex;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.65);
            border: 1px solid var(--line);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        h1 {
            margin: 14px 0 10px;
            font-size: clamp(30px, 4vw, 46px);
            line-height: 1.05;
        }

        .hero-copy {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 22px;
        }

        .stat {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--line);
        }

        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 13px; color: var(--muted); margin-top: 6px; }

        .panel {
            padding: 24px;
        }

        .panel h2, .drawer-panel h2 {
            margin: 0 0 16px;
            font-size: 20px;
        }

        .form-grid {
            display: grid;
            gap: 14px;
        }

        .form-grid .actions {
            justify-content: flex-start;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--muted);
        }

        input, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 13px 15px;
            font-size: 14px;
            background: rgba(255,255,255,0.82);
            color: var(--ink);
        }

        .actions, .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button, .button-link {
            border: none;
            border-radius: 999px;
            padding: 11px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        button:hover, .button-link:hover { transform: translateY(-1px); }
        button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .primary { background: var(--primary); color: #fff; }
        .soft { background: var(--primary-soft); color: var(--primary); }
        .warn { background: rgba(180, 83, 9, 0.12); color: var(--warn); }
        .danger { background: rgba(185, 28, 28, 0.12); color: var(--danger); }
        .ghost { background: rgba(255,255,255,0.7); color: var(--ink); border: 1px solid var(--line); }

        .layout {
            display: block;
        }

        .toolbar {
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .task-list {
            display: grid;
            gap: 14px;
        }

        .task-card {
            padding: 20px;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease;
        }

        .task-card.active {
            border-color: rgba(15, 118, 110, 0.28);
            transform: translateY(-2px);
        }

        .task-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .task-name {
            font-size: 18px;
            margin: 0 0 6px;
            word-break: break-word;
        }

        .task-url {
            color: var(--muted);
            font-size: 13px;
            word-break: break-all;
            line-height: 1.5;
            max-width: 100%;
        }

        .status {
            white-space: nowrap;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid currentColor;
        }

        .progress {
            margin: 16px 0 10px;
            height: 10px;
            border-radius: 999px;
            background: rgba(31, 42, 44, 0.08);
            overflow: hidden;
        }

        .progress > span {
            display: block;
            height: 100%;
            width: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, #0f766e, #0ea5a0);
        }

        .task-meta, .detail-grid, .item-row {
            display: grid;
            gap: 8px;
        }

        .task-meta {
            grid-template-columns: repeat(4, minmax(0, 1fr));
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
        }

        .task-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .task-actions button {
            width: 100%;
            min-height: 42px;
        }

        .empty {
            padding: 34px 20px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 20px;
            background: rgba(255,255,255,0.45);
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            padding: 14px 16px;
            background: rgba(31,42,44,0.92);
            color: #fff;
            border-radius: 16px;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 1100px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .panel {
                padding: 20px;
            }
        }

        @media (max-width: 720px) {
            .shell { padding: 16px 12px 28px; }

            .hero-card,
            .panel,
            .task-card {
                border-radius: 20px;
            }

            .hero-card,
            .panel {
                padding: 18px;
            }

            h1 {
                margin-top: 12px;
                font-size: clamp(26px, 8vw, 34px);
            }

            .hero-copy {
                font-size: 14px;
                line-height: 1.65;
            }

            .stat-grid,
            .task-meta {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .stat {
                padding: 14px;
            }

            .stat-value {
                font-size: 24px;
            }

            .toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .toolbar .actions,
            .form-grid .actions {
                display: grid;
                grid-template-columns: 1fr;
                width: 100%;
            }

            .toolbar .actions select,
            .form-grid .actions button {
                width: 100%;
            }

            .task-card {
                padding: 16px;
            }

            .task-top {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .status {
                align-self: flex-start;
            }

            .task-meta {
                gap: 10px;
            }

            .task-actions {
                grid-template-columns: 1fr 1fr;
            }

            .toast {
                left: 12px;
                right: 12px;
                bottom: 12px;
            }
        }

        @media (max-width: 480px) {
            .eyebrow {
                font-size: 11px;
            }

            .task-name {
                font-size: 16px;
            }

            .task-meta {
                grid-template-columns: 1fr 1fr;
                font-size: 11px;
            }

            .task-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="hero">
            <div class="hero-card">
                <span class="eyebrow">HLS Download Orchestrator</span>
                <h1>高吞吐 HLS 任务控制台</h1>
                <p class="hero-copy">页面只展示任务级状态和轻量进度，后端以 manifest/progress 文件承接分片事实，不再维护独立 task_item 表。</p>
                <div class="stat-grid">
                    <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">总任务</div></div>
                    <div class="stat"><div class="stat-value" id="stat-active">0</div><div class="stat-label">下载中</div></div>
                    <div class="stat"><div class="stat-value" id="stat-failed">0</div><div class="stat-label">失败任务</div></div>
                </div>
            </div>
            <div class="panel">
                <h2>新增下载任务</h2>
                <div class="form-grid">
                    <div>
                        <label for="task-name">任务名称</label>
                        <input id="task-name" placeholder="可留空，默认从 URL 推导">
                    </div>
                    <div>
                        <label for="task-url">M3U8 地址</label>
                        <input id="task-url" placeholder="https://example.com/video.m3u8">
                    </div>
                    <div class="actions">
                        <button class="primary" id="submit-task">创建任务</button>
                        <button class="ghost" id="sync-all">对账未完成项</button>
                        <button class="ghost" id="refresh-all">刷新列表</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="layout">
            <div class="panel">
                <div class="toolbar">
                    <h2>任务列表</h2>
                    <div class="actions">
                        <select id="status-filter">
                            <option value="">全部状态</option>
                            <option value="pending">pending</option>
                            <option value="parsing">parsing</option>
                            <option value="downloading">downloading</option>
                            <option value="paused">paused</option>
                            <option value="failed">failed</option>
                            <option value="completed">completed</option>
                        </select>
                    </div>
                </div>
                <div class="task-list" id="task-list"></div>
            </div>
        </section>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '/api/v1';
        const state = {
            tasks: [],
            metrics: {},
            taskFilter: '',
            pollTimer: null,
            actionLocks: new Set()
        };

        const el = {
            taskList: document.getElementById('task-list'),
            taskName: document.getElementById('task-name'),
            taskURL: document.getElementById('task-url'),
            statusFilter: document.getElementById('status-filter'),
            toast: document.getElementById('toast')
        };

        document.getElementById('submit-task').addEventListener('click', createTask);
        document.getElementById('sync-all').addEventListener('click', syncAll);
        document.getElementById('refresh-all').addEventListener('click', fetchTasks);
        el.statusFilter.addEventListener('change', () => {
            state.taskFilter = el.statusFilter.value;
            renderTasks();
        });

        fetchTasks();

        async function fetchTasks() {
            const query = state.taskFilter ? `?status=${encodeURIComponent(state.taskFilter)}` : '';
            const res = await fetch(`${API}/tasks${query}`);
            const data = await res.json();
            state.tasks = data.items || [];
            state.metrics = data.metrics || {};
            updateStats();
            renderTasks();
            schedulePoll();
        }

        function schedulePoll() {
            clearTimeout(state.pollTimer);
            const busy = state.tasks.some(task => ['downloading', 'parsing'].includes(task.status));
            state.pollTimer = setTimeout(fetchTasks, busy ? 3000 : 8000);
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = state.tasks.length;
            document.getElementById('stat-active').textContent = state.metrics.runtime_count ?? state.tasks.filter(task => task.status === 'downloading').length;
            document.getElementById('stat-failed').textContent = state.metrics.dirty_runtime_count ?? state.tasks.filter(task => task.status === 'failed').length;
            document.querySelector('#stat-total + .stat-label').textContent = '总任务';
            document.querySelector('#stat-active + .stat-label').textContent = 'runtime 数';
            document.querySelector('#stat-failed + .stat-label').textContent = '脏 runtime';
            const heroCopy = document.querySelector('.hero-copy');
            heroCopy.textContent = `页面只展示任务级状态和轻量进度。活跃调度 ${state.metrics.active_dispatches ?? 0}，最近刷盘 ${state.metrics.last_flush_cost_ms ?? 0}ms，平均刷盘 ${state.metrics.average_flush_cost_ms ?? 0}ms。`;
        }

        function renderTasks() {
            const tasks = state.taskFilter ? state.tasks.filter(task => task.status === state.taskFilter) : state.tasks;
            if (!tasks.length) {
                el.taskList.innerHTML = '<div class="empty">当前没有任务。</div>';
                return;
            }

            el.taskList.innerHTML = tasks.map(task => {
                const progress = Math.round((Number(task.progress || 0)) * 100);
                const color = statusColor(task.status);
                return `
                    <article class="task-card" data-id="${task.id}">
                        <div class="task-top">
                            <div>
                                <h3 class="task-name">${escapeHTML(task.name || 'Untitled Task')}</h3>
                                <div class="task-url">${escapeHTML(task.original_url)}</div>
                            </div>
                            <div class="status" style="color:${color};">${task.status}</div>
                        </div>
                        <div class="progress"><span style="width:${progress}%; background:${progressColor(task.status)}"></span></div>
                        <div style="font-size:13px; color:var(--muted);">${task.downloaded_segments}/${task.total_segments || task.total_items} 已完成，失败 ${task.failed_items || 0}</div>
                        <div class="task-meta">
                            <div>任务ID<br><strong>${task.id.slice(0, 10)}</strong></div>
                            <div>进度<br><strong>${progress}%</strong></div>
                            <div>分片<br><strong>${task.done_items}/${task.total_items}</strong></div>
                            <div>状态<br><strong>${task.status}</strong></div>
                        </div>
                        <div class="task-actions">
                            <button class="primary" data-action="play">代理播放</button>
                            ${task.status === 'downloading' ? `<button class="warn" data-action="pause" ${state.actionLocks.has(task.id) ? 'disabled' : ''}>${state.actionLocks.has(task.id) ? '处理中' : '暂停'}</button>` : ''}
                            ${['paused', 'failed'].includes(task.status) ? `<button class="soft" data-action="resume" ${state.actionLocks.has(task.id) ? 'disabled' : ''}>${state.actionLocks.has(task.id) ? '处理中' : '恢复'}</button>` : ''}
                            ${task.failed_items > 0 ? `<button class="soft" data-action="retry" ${state.actionLocks.has(task.id) ? 'disabled' : ''}>${state.actionLocks.has(task.id) ? '处理中' : '重试失败项'}</button>` : ''}
                            <button class="danger" data-action="delete" ${state.actionLocks.has(task.id) ? 'disabled' : ''}>${state.actionLocks.has(task.id) ? '处理中' : '删除'}</button>
                        </div>
                    </article>
                `;
            }).join('');

            [...el.taskList.querySelectorAll('.task-card')].forEach(card => {
                card.addEventListener('click', event => {
                    const action = event.target.getAttribute('data-action');
                    const id = card.dataset.id;
                    if (action) {
                        event.stopPropagation();
                        quickAction(id, action);
                    }
                });
            });
        }

        async function createTask() {
            const name = el.taskName.value.trim();
            const url = el.taskURL.value.trim();
            if (!url) {
                toast('请输入 m3u8 地址', true);
                return;
            }
            const res = await fetch(`${API}/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, url })
            });
            if (!res.ok) {
                toast(await res.text(), true);
                return;
            }
            el.taskName.value = '';
            el.taskURL.value = '';
            toast('任务已提交');
            fetchTasks();
        }

        async function quickAction(id, action) {
            const task = state.tasks.find(item => item.id === id);
            if (!task) return;
            if (action === 'play') {
                window.location.assign(`/proxy/m3u8/${encodeURIComponent(task.original_url)}`);
                return;
            }
            if (action === 'delete') {
                await taskAction(id, '', { method: 'DELETE' });
                return;
            }
            if (action === 'retry') {
                await taskAction(id, 'retry', { method: 'POST' });
                return;
            }
            await taskAction(id, action);
        }

        async function taskAction(taskID, action, override = null) {
            if (!taskID) return;
            if (state.actionLocks.has(taskID)) return;
            let url = `${API}/tasks/${taskID}`;
            let options = override || { method: 'POST' };
            if (action) {
                url += `/${action}`;
            }
            if (!confirm(`确认执行 ${action || 'delete'} 操作？`)) return;
            state.actionLocks.add(taskID);
            applyOptimisticTaskAction(taskID, action);
            renderTasks();
            if (options.body && !options.headers) {
                options.headers = { 'Content-Type': 'application/json' };
            }
            const res = await fetch(url, options);
            if (!res.ok) {
                state.actionLocks.delete(taskID);
                await fetchTasks();
                toast(await res.text(), true);
                return;
            }
            toast(action ? `${action} 已执行` : '任务已删除');
            state.actionLocks.delete(taskID);
            await fetchTasks();
        }

        function applyOptimisticTaskAction(taskID, action) {
            state.tasks = state.tasks.map(task => {
                if (task.id !== taskID) return task;
                if (action === 'pause') {
                    return { ...task, status: 'paused' };
                }
                if (action === 'resume' || action === 'retry') {
                    return { ...task, status: 'downloading' };
                }
                return task;
            }).filter(task => !(task.id === taskID && action === ''));
        }

        async function syncAll() {
            const res = await fetch(`${API}/tasks/sync`, { method: 'POST' });
            if (!res.ok) {
                toast(await res.text(), true);
                return;
            }
            const data = await res.json();
            toast(`已核对 ${data.updated || 0} 个未完成文件`);
            fetchTasks();
        }

        function toast(message, isError = false) {
            el.toast.textContent = message || (isError ? '操作失败' : '操作成功');
            el.toast.style.background = isError ? 'rgba(185, 28, 28, 0.94)' : 'rgba(31,42,44,0.92)';
            el.toast.classList.add('show');
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => el.toast.classList.remove('show'), 2400);
        }

        function statusColor(status) {
            switch (status) {
                case 'completed': return 'var(--ok)';
                case 'failed': return 'var(--danger)';
                case 'paused': return 'var(--warn)';
                case 'downloading': return 'var(--primary)';
                default: return 'var(--muted)';
            }
        }

        function progressColor(status) {
            switch (status) {
                case 'completed': return 'linear-gradient(90deg, #16a34a, #22c55e)';
                case 'failed': return 'linear-gradient(90deg, #dc2626, #ef4444)';
                case 'paused': return 'linear-gradient(90deg, #d97706, #f59e0b)';
                default: return 'linear-gradient(90deg, #0f766e, #0ea5a0)';
            }
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }
    </script>
</body>
</html>
